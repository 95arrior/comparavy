name: Daily Comparavy Guides

on:
  schedule:
    # Runs daily at 07:00 KST, which is 22:00 UTC.
    - cron: "0 22 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-guides-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
      OPENAI_REASONING_EFFORT: ${{ secrets.OPENAI_REASONING_EFFORT }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check OpenAI availability
        run: npm run check:openai

      - name: Generate and publish guide candidates
        run: npm run auto:publish-guides -- --count 2 --type mixed --publish

      - name: Check guide quality
        run: npm run check:guides

      - name: Commit and push guide updates
        shell: bash
        run: |
          git config user.name "comparavy-bot"
          git config user.email "comparavy-bot@users.noreply.github.com"
          git add content/guides
          if git diff --cached --quiet; then
            echo "No guide changes to commit."
            exit 0
          fi
          git commit -m "Auto publish daily AI tool guides"
          git push
